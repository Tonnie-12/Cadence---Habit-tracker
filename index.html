<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cadence — Daily Discipline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#14161b; --panel:#1b1e25; --panel2:#20242c; --line:#2b303a; --line2:#363c48;
  --txt:#e9ebef; --muted:#959cab; --dim:#6b7280;
  --empty:#262b34;
  --walk:#46c08a; --french:#5b8cff; --study:#f0a830; --pray:#b07cff;
  --ok:#46c08a; --late:#ef6b6b; --teal:#2dd4bf; --amber:#ffffff; --onaccent:#15161b;
  --r:16px;
}
:root[data-theme="light"]{
  --bg:#f6f8fa; --panel:#ffffff; --panel2:#f1f3f7; --line:#e6e9ef; --line2:#d4d9e1;
  --txt:#1c2024; --muted:#565d6b; --dim:#676e7b; --empty:#edf0f5;
  --amber:#5b57d6; --onaccent:#ffffff;
  --ok:#157a4d; --late:#c22626;
}
/* Light-mode only: white fills for inputs and the number cells, clearer day numbers */
:root[data-theme="light"] .authcard input,
:root[data-theme="light"] .namerow input,
:root[data-theme="light"] .plinks input,
:root[data-theme="light"] .nsinput,
:root[data-theme="light"] .sefield input{background:#ffffff}
:root[data-theme="light"] .wc{background:#ffffff;border:1px solid var(--line2);color:#333a45}
:root[data-theme="light"] .wc.on{background:var(--teal);border-color:var(--teal);color:#0c1413}
:root[data-theme="light"] .nsmark{background:#ffffff}
:root[data-theme="light"] .pday.on .nsmark{background:var(--walk);border-color:var(--walk)}
:root[data-theme="light"] .cell .n{color:#565d6b}
:root[data-theme="light"] .rte{background:#ffffff}
:root[data-theme="light"] .chip.under{background:rgba(123,110,246,.15);color:#4b45c9}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--txt);
  font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{background:
  radial-gradient(1200px 600px at 80% -10%, rgba(240,168,48,.06), transparent 60%),
  radial-gradient(900px 500px at -10% 10%, rgba(91,140,255,.06), transparent 55%), var(--bg);}
.app{max-width:1080px;margin:0 auto;padding:22px 20px 70px}
header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.brand{display:flex;align-items:baseline;gap:11px}
.brand h1{font-family:Space Grotesk,sans-serif;font-weight:700;font-size:23px;margin:0;letter-spacing:-.01em}
.brand .tag{color:var(--dim);font-size:12.5px}
.months{display:flex;gap:5px;flex-wrap:wrap}
.topright{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.dnswitch{position:relative;width:62px;height:30px;border-radius:999px;border:1px solid var(--line2);background:var(--panel2);cursor:pointer;padding:0;flex:none;display:flex;align-items:center;justify-content:space-around;overflow:hidden}
.dnswitch .dn-ic{font-size:13px;width:30px;text-align:center;z-index:1;line-height:1}
.dnswitch .dn-ic.sun{color:#f0a830}
.dnswitch .dn-ic.moon{color:#9fb0ff}
.dn-knob{position:absolute;top:2px;left:2px;width:28px;height:24px;border-radius:999px;background:var(--panel);box-shadow:0 1px 3px rgba(0,0,0,.35);transition:transform .2s;transform:translateX(30px)}
:root[data-theme="light"] .dn-knob{transform:translateX(0)}
.account{display:flex;align-items:center;gap:8px}
.acc-email{font-size:12px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acc-btn{font:600 12px Inter;border:1px solid var(--line);background:var(--panel);color:var(--txt);border-radius:9px;padding:6px 11px;cursor:pointer}
.acc-btn:hover{border-color:var(--line2)}
.authwrap{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(8,10,14,.72);backdrop-filter:blur(4px)}
.authcard{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px 24px;box-shadow:0 24px 70px -24px rgba(0,0,0,.7);text-align:center}
.authmark{width:44px;height:44px;border-radius:12px;margin:0 auto 14px;background:#5b57d6;display:grid;place-items:center;color:#fff;font:800 20px Space Grotesk}
.authcard h2{font-family:Space Grotesk;font-weight:600;font-size:20px;margin:0 0 6px}
.authcard p{color:var(--muted);font-size:13px;margin:0 0 18px;line-height:1.5}
.authcard input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;color:var(--txt);font:500 14px Inter;margin-bottom:10px}
.authcard input:focus{outline:none;border-color:var(--amber)}
.authbtn{width:100%;border:0;border-radius:11px;padding:12px;background:var(--amber);color:var(--onaccent);font:700 14px Inter;cursor:pointer}
.authbtn:hover{filter:brightness(1.05)}
.authlink{margin-top:8px;background:none;border:0;color:var(--dim);font:500 12.5px Inter;cursor:pointer;text-decoration:underline;display:block;width:100%}
.authlink:hover{color:var(--muted)}
.authmsg{min-height:18px;font-size:12.5px;color:var(--muted);margin-top:12px}
.authskip{margin-top:14px;background:none;border:0;color:var(--dim);font:500 12.5px Inter;cursor:pointer;text-decoration:underline}
.authskip:hover{color:var(--muted)}
.botnav{display:none}
.moresheet{display:none}
.mpill{font:600 12.5px Space Grotesk;color:var(--dim);background:var(--panel);border:1px solid var(--line);
  padding:7px 12px;border-radius:999px;cursor:pointer;transition:.15s}
.mpill:hover{color:var(--txt);border-color:var(--line2)}
.mpill.on{color:var(--onaccent);background:var(--amber);border-color:var(--amber)}
.layout{display:grid;grid-template-columns:230px 1fr;gap:20px;align-items:start}
nav.rail{display:flex;flex-direction:column;gap:5px;position:sticky;top:18px}
.tab{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:12px;cursor:pointer;
  border:1px solid transparent;color:var(--muted);transition:.14s;background:transparent}
.tab:hover{background:var(--panel);color:var(--txt)}
.tab.on{background:var(--panel);border-color:var(--line2);color:var(--txt)}
.tab .ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:14px;
  background:var(--panel2);color:var(--txt);flex:none}
.tab.on .ic{box-shadow:inset 0 0 0 1.5px currentColor}
.tab .nm{font:600 13.5px Inter;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab .pg{font:600 11px Space Grotesk;color:var(--dim)}
.tab.on .pg{color:var(--txt)}
main{min-width:0}
.savebar{display:flex;align-items:center;gap:7px;color:var(--dim);font-size:11.5px;margin:2px 0 14px}
.savedot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px 22px 20px}
.phead{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.phead .big{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex:none}
.phead h2{font-family:Space Grotesk,sans-serif;font-weight:600;font-size:21px;margin:0}
.phead p{margin:3px 0 0;color:var(--muted);font-size:13px;max-width:60ch}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:96px}
.stat b{font-family:Space Grotesk,sans-serif;font-size:24px;display:block;line-height:1}
.stat span{font-size:11px;color:var(--muted);display:block;margin-top:5px;letter-spacing:.02em}
.gridwrap{overflow:visible;padding:4px 3px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;width:100%}
.wd{font:600 10px Space Grotesk;color:var(--dim);display:grid;place-items:center;height:30px}
.cell{aspect-ratio:1;border-radius:14px;background:var(--empty);display:grid;place-items:center;
  cursor:pointer;transition:transform .08s, background .14s;position:relative}
.cell:hover{transform:translateY(-1px)}
.cell.blank{background:transparent;pointer-events:none}
.cell .n{font:600 clamp(14px,2.4vw,18px) Space Grotesk;color:#8a92a0}
.cell.on .n{color:rgba(0,0,0,.6)}
.cell.today::after{content:"";position:absolute;inset:-3px;border-radius:17px;border:2px solid var(--amber)}
.legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:16px}
.legend i{width:12px;height:12px;border-radius:4px;display:inline-block;vertical-align:-2px;margin-right:6px}
.sgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;width:100%}
.scell{min-height:98px;border-radius:14px;background:var(--panel2);border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px 7px;position:relative}
.strow{display:flex;align-items:center;gap:5px;width:100%}
.strow label{font:700 8px Space Grotesk;color:var(--dim);width:20px;flex:none;text-transform:uppercase;letter-spacing:.03em}
.scell.today{outline:2px solid var(--amber);outline-offset:-1px}
.scell.blank{background:transparent;border:0}
.scell .sd{font:600 clamp(13px,2vw,16px) Space Grotesk;color:var(--dim)}
.scell input{width:100%;border:0;background:transparent;color:var(--txt);font:600 clamp(11px,1.6vw,13px) Space Grotesk;text-align:center;padding:0}
.scell input::-webkit-calendar-picker-indicator{filter:invert(.6)}
.scell.ok{background:rgba(70,192,138,.16);border-color:rgba(70,192,138,.5)}
.scell.bad{background:rgba(239,107,107,.15);border-color:rgba(239,107,107,.5)}
.scell.ok .sd{color:var(--ok)}.scell.bad .sd{color:var(--late)}
.namerow{margin-bottom:18px}
.namerow input{width:100%;max-width:420px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;
  padding:11px 14px;color:var(--txt);font:600 14px Inter}
.namerow input:focus{outline:none;border-color:var(--amber)}
.weeks{display:flex;flex-direction:column;gap:10px}
.week{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px 14px}
.week .lbl{font:600 12.5px Inter;min-width:150px}
.week .lbl small{display:block;color:var(--dim);font-weight:500;font-size:11px}
.week .days{display:flex;gap:6px}
.wc{width:30px;height:30px;border-radius:8px;background:var(--empty);display:grid;place-items:center;
  font:600 11px Space Grotesk;color:#6c7480;cursor:pointer;transition:.12s}
.wc.on{background:var(--teal);color:#0c1413}
.chip{font:600 11.5px Space Grotesk;padding:5px 11px;border-radius:999px;margin-left:auto}
.chip.under{background:rgba(240,168,48,.16);color:var(--amber)}
.chip.ok{background:rgba(70,192,138,.18);color:var(--ok)}
.chip.over{background:rgba(91,140,255,.18);color:var(--french)}
.wkends{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.wkend{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:14px}
.wkend .dt{display:flex;align-items:center;gap:9px;font:600 13px Inter;margin-bottom:9px}
.wkend .mk{width:18px;height:18px;border-radius:6px;border:1.6px solid var(--line2);display:grid;place-items:center;font-size:12px;color:#0c1413}
.wkend.done .mk{background:var(--walk);border-color:var(--walk)}
.wkend.done .dt{color:var(--walk)}
.rtbar{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.rtbar button{background:var(--panel);border:1px solid var(--line2);color:var(--txt);border-radius:8px;padding:5px 9px;font:600 12px Inter;cursor:pointer;line-height:1}
.rtbar button:hover{border-color:var(--walk)}
.rte{width:100%;min-height:66px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 10px;color:var(--txt);font:500 13px Inter;line-height:1.5;outline:none}
.rte:focus{border-color:var(--walk)}
.rte:empty:before{content:attr(data-ph);color:var(--dim)}
.rte ul{margin:4px 0 4px 20px;padding:0}
.rte li{margin:2px 0}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:15px 16px}
.kpi b{font-family:Space Grotesk;font-size:26px;display:block;line-height:1}
.kpi span{font-size:11.5px;color:var(--muted);display:block;margin-top:6px}
.matrix{overflow-x:auto}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.mrow .ml{width:120px;flex:none;font:600 12.5px Inter;display:flex;align-items:center;gap:8px}
.mrow .ml i{width:10px;height:10px;border-radius:3px;flex:none}
.mline{display:flex;gap:3px}
.mcell{width:15px;height:15px;border-radius:4px;background:var(--empty);cursor:pointer}
.pday{display:flex;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;flex-wrap:wrap}
.pday.on{border-color:var(--teal)}
.pday .pdate{font:600 13px Inter;min-width:64px}
.pday .pdate small{display:block;color:var(--dim);font-weight:500;font-size:10px}
.stepper{display:flex;align-items:center;gap:8px}
.stepper button{width:28px;height:28px;border-radius:8px;border:1px solid var(--line2);background:var(--panel);color:var(--txt);font:700 16px Inter;cursor:pointer;line-height:1;display:grid;place-items:center}
.stepper button:hover{border-color:var(--teal)}
.stepper .cnt{font:700 15px Space Grotesk;min-width:46px;text-align:center}
.stepper .cnt small{color:var(--dim);font-weight:500;font-size:10px}
.plinks{display:flex;flex-direction:column;gap:6px;width:100%;margin-top:2px}
.plinks input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--txt);font:500 12.5px Inter}
.plinks input:focus{outline:none;border-color:var(--teal)}
.nsmark{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line2);display:grid;place-items:center;font-size:13px;color:#0c1413;flex:none}
.pday.on .nsmark{background:var(--walk);border-color:var(--walk)}
.nsinput{flex:1;min-width:150px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--txt);font:500 13px Inter}
.nsinput:focus{outline:none;border-color:var(--walk)}
.sgoal{font-size:13px;color:var(--muted);margin:-4px 0 16px}
.sgoal .gon{color:var(--ok);font-weight:700}
.sgoal .glate{color:var(--late);font-weight:700}
.sgrid2{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;width:100%}
.scell2{aspect-ratio:1;border-radius:14px;background:var(--empty);display:grid;place-items:center;cursor:pointer;position:relative;transition:transform .08s,background .14s}
.scell2:hover{transform:translateY(-1px)}
.scell2 .sd{font:600 clamp(14px,2.4vw,18px) Space Grotesk;color:#8a92a0}
.scell2.ok{background:rgba(70,192,138,.85)}
.scell2.bad{background:rgba(239,107,107,.85)}
.scell2.ok .sd,.scell2.bad .sd{color:rgba(0,0,0,.62)}
.scell2.today{outline:2px solid var(--amber);outline-offset:-1px}
.scell2.sel{box-shadow:0 0 0 2px var(--french)}
.sedit{border:1px solid var(--french);border-radius:14px;padding:16px;margin-bottom:16px;background:var(--panel2)}
.sehead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.setitle{font:600 16px Space Grotesk}
.seclose{background:transparent;border:0;color:var(--muted);font-size:16px;cursor:pointer;line-height:1}
.sefields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.sefield label{display:block;font:700 10px Space Grotesk;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.sefield input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px;color:var(--txt);font:600 16px Space Grotesk}
.sefield input:focus{outline:none;border-color:var(--french)}
.sefield input::-webkit-calendar-picker-indicator{filter:invert(.6)}
.seacts{display:flex;gap:10px}
.sbtn{border:0;border-radius:10px;padding:11px 20px;font:700 13px Inter;cursor:pointer}
.sbtn.save{background:var(--ok);color:#0c1413}
.sbtn.clear{background:transparent;border:1px solid var(--line2);color:var(--muted)}
.sbtn.clear:hover{border-color:var(--late);color:var(--late)}
/* Buttons use the same purple as the active month pill (#5b57d6) */
.authbtn,.acc-btn,.sbtn.save,.sbtn.clear{
  border:0;color:#fff;font-weight:700;position:relative;
  background:#5b57d6;
  box-shadow:0 0 0 1px rgba(75,69,201,.45), #FFFFFF38 0 1px 0 0 inset, 0 1px 2px 0 rgba(0,0,0,.07);
  transition:all .15s cubic-bezier(.4,0,.2,1);
}
.authbtn:hover,.acc-btn:hover,.sbtn.save:hover,.sbtn.clear:hover{filter:brightness(1.08);color:#fff}
.authbtn:active,.acc-btn:active,.sbtn.save:active,.sbtn.clear:active{transform:scale(.95);filter:none}
@media (max-width:520px){.sefields{grid-template-columns:1fr}}
@media (max-width:760px){
  .app{padding:16px 14px 96px}
  header.top{gap:12px}
  .brand h1{font-size:20px}
  .mpill{padding:6px 11px}
  .layout{grid-template-columns:1fr;gap:14px}
  nav.rail{display:none}
  .panel{padding:16px 14px 14px}
  .grid,.sgrid2{gap:6px}
  .stats{gap:8px}
  .stat{padding:11px 13px;min-width:0;flex:1}
  .phead h2{font-size:19px}
  /* bottom home bar */
  .botnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--panel);border-top:1px solid var(--line);justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:12px;color:var(--muted);cursor:pointer;transition:.12s}
  .bn-item.on{background:var(--panel2);color:var(--txt)}
  .bn-item.on .bn-lb{color:var(--amber)}
  .bn-ic{font-size:18px;line-height:1}
  .bn-lb{font:600 10px Inter;white-space:nowrap}
  /* overflow sheet */
  .moresheet{position:fixed;inset:0;z-index:60}
  .ms-backdrop{position:absolute;inset:0;background:rgba(8,10,14,.5);opacity:0;transition:opacity .22s}
  .moresheet.open .ms-backdrop{opacity:1}
  .ms-panel{position:absolute;left:0;right:0;bottom:0;background:var(--panel);border-top-left-radius:20px;border-top-right-radius:20px;padding:8px 14px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -12px 44px -14px rgba(0,0,0,.55);transform:translateY(100%);transition:transform .24s ease}
  .moresheet.open .ms-panel{transform:translateY(0)}
  .ms-grab{width:40px;height:4px;border-radius:2px;background:var(--line2);margin:6px auto 10px}
  .ms-head{display:flex;align-items:center;justify-content:space-between;padding:2px 2px 12px}
  .ms-title{font:700 12px Space Grotesk;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .ms-x{background:none;border:0;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0 4px}
  .ms-list{display:flex;flex-direction:column;gap:6px}
  .ms-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;color:var(--txt);cursor:pointer;background:var(--panel2)}
  .ms-item.on{outline:1.5px solid var(--amber)}
  .ms-ic{width:28px;height:28px;border-radius:8px;background:var(--bg);display:grid;place-items:center;font-size:15px;flex:none}
  .ms-item > span:nth-child(2){flex:1;font:600 14px Inter}
  .ms-pg{font:600 12px Space Grotesk;color:var(--dim)}
}
@media (min-width:761px){
  /* Web/desktop: always use the side rail, never the mobile bottom bar. */
  nav.rail{display:flex}
  .botnav,.moresheet{display:none!important}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><h1>Cadence</h1><span class="tag">daily discipline · 2026</span></div>
    <div class="topright">
      <div class="months" id="months"></div>
      <button class="dnswitch" id="themebtn" role="switch" aria-checked="false" title="Day / night">
        <span class="dn-ic sun">&#9728;</span>
        <span class="dn-ic moon">&#9790;</span>
        <span class="dn-knob"></span>
      </button>
      <div class="account" id="account"></div>
    </div>
  </header>
  <div class="savebar"><span class="savedot" id="savedot"></span><span id="savetxt">Saved</span></div>
  <div class="layout">
    <nav class="rail" id="rail"></nav>
    <main id="main"></main>
  </div>
</div>

  var pdm=D().podcasts,peps=0;for(var ppk in pdm){if(pdm[ppk])peps+=(pdm[ppk].n||0);}
  var nsm=D().noscreen,nsc=0;for(var nk in nsm){if(nsm[nk]&&nsm[nk].trim())nsc++;}
  var wkTot=0;for(var day=1;day<=mi.days;day++){if(((new Date(YEAR,mi.m,day).getDay()+6)%7)===5)wkTot++;}
  var w=D().weekends,wkDone=0;for(var kk in w){if(wkHas(w[kk]))wkDone++;}
  var cards=el("div","cards");
  cards.innerHTML=
    '<div class="kpi"><b>'+totalDone+'</b><span>habit days marked</span></div>'+
    '<div class="kpi"><b>'+bestStreak+'</b><span>best streak</span></div>'+
    '<div class="kpi"><b>'+so+'/'+sf+'</b><span>sleep on target</span></div>'+
    '<div class="kpi"><b>'+wkDone+'/'+wkTot+'</b><span>weekend builds</span></div>'+
    '<div class="kpi"><b>'+peps+'</b><span>podcast episodes</span></div>';
  p.appendChild(cards);
  var mx=el("div","matrix");
  var top=el("div","mrow");top.appendChild(el("div","ml",""));
  var hline=el("div","mline");
  for(var d=1;d<=mi.days;d++){var lab=el("div","mcell");lab.style.background="transparent";
    lab.innerHTML='<span style="font:600 8px Space Grotesk;color:var(--dim)">'+(d%5===1?d:"")+'</span>';
    lab.style.cursor="default";hline.appendChild(lab);}
  top.appendChild(hline);mx.appendChild(top);
  HIDS.forEach(function(h){
    var meta=HMETA[h],map=D().habits[h];
    var row=el("div","mrow");
    var ml=el("div","ml");ml.innerHTML='<i style="background:'+meta.color+'"></i>'+meta.name.split(" \u00B7")[0];
    row.appendChild(ml);
    var line=el("div","mline");
    for(var d=1;d<=mi.days;d++){
      var c=el("div","mcell");if(map[d])c.style.background=meta.color;
      (function(day,cell){cell.onclick=function(){if(map[day])delete map[day];else map[day]=true;
        cell.style.background=map[day]?meta.color:"var(--empty)";save();renderRail();
        var td=HIDS.reduce(function(a,h){return a+cnt(D().habits[h]);},0);cards.querySelectorAll("b")[0].textContent=td;
      };})(d,c);
      line.appendChild(c);
    }
    row.appendChild(line);mx.appendChild(row);
  });
  (function(){var row=el("div","mrow");var ml=el("div","ml");ml.innerHTML='<i style="background:var(--teal)"></i>Podcasts';row.appendChild(ml);var line=el("div","mline");for(var d=1;d<=mi.days;d++){var c=el("div","mcell");var rec=D().podcasts[d];if(rec&&rec.n>0)c.style.background="var(--teal)";c.style.cursor="default";line.appendChild(c);}row.appendChild(line);mx.appendChild(row);})();
  p.appendChild(mx);
  return p;
}

function renderMain(){
  var m=document.getElementById("main");m.innerHTML="";
  var node;
  if(active==="overview")node=renderOverview();
  else if(active==="sleep")node=renderSleep();
  else if(active==="weekly")node=renderWeekly();
  else if(active==="weekend")node=renderWeekend();
  else if(active==="podcasts")node=renderPodcasts();
  else if(active==="noscreen")node=renderNoScreen();
  else node=renderHabit(active);
  m.appendChild(node);
}
function tabProgress(id){
  var mi=info(cur);
  if(id==="overview"){return HIDS.reduce(function(a,h){return a+cnt(D().habits[h]);},0)+"";}
  if(HMETA[id]){return cnt(D().habits[id])+"/"+mi.days;}
  if(id==="sleep"){var o=0,f=0;for(var dd=1;dd<=mi.days;dd++){var b=sBed(dd);if(b){f++;if(sleepOK(b))o++;}}return f?o+"/"+f:"";}
  if(id==="podcasts"){var pd=D().podcasts,e=0;for(var pk in pd){if(pd[pk])e+=(pd[pk].n||0);}return e?String(e):"";}
  if(id==="noscreen"){var ns=D().noscreen,c=0;for(var nk in ns){if(ns[nk]&&ns[nk].trim())c++;}return c?String(c):"";}
  if(id==="weekly"){var on=0,tot=0;weeksOf(mi).forEach(function(ds){tot++;var n=ds.reduce(function(a,d){return a+(D().weekly.days[d]?1:0);},0);if(n>=3&&n<=5)on++;});return on+"/"+tot;}
  if(id==="weekend"){var w=D().weekends,dn=0,tt=0;for(var day=1;day<=mi.days;day++){if(((new Date(YEAR,mi.m,day).getDay()+6)%7)===5)tt++;}for(var kk in w){if(wkHas(w[kk]))dn++;}return dn+"/"+tt;}
  return "";
}
// Shared tab selector used by the desktop rail, the mobile bottom bar, and the More sheet.
function selectTab(id){active=id;closeMore();renderRail();renderMain();window.scrollTo({top:0,behavior:"smooth"});}
function renderRail(){
  var r=document.getElementById("rail");
  if(r){
    r.innerHTML="";
    TABS.forEach(function(t){
      var tab=el("div","tab"+(t.id===active?" on":""));
      var ic=el("div","ic",t.icon);
      if(HMETA[t.id])ic.style.color=HMETA[t.id].color; else ic.style.color="var(--amber)";
      tab.appendChild(ic);
      tab.appendChild(el("div","nm",t.name));
      tab.appendChild(el("div","pg",tabProgress(t.id)));
      tab.onclick=function(){selectTab(t.id);};
      r.appendChild(tab);
    });
  }
  renderBotNav(); // keep the mobile bottom bar in sync
}
// Mobile only: 4 primary tabs on a bottom home bar + a "More" button for the rest.
var PRIMARY=["overview","walk","french","pray"];
function shortName(t){return t.id==="overview"?"Home":t.id==="walk"?"Walk":t.id==="french"?"French":t.id==="pray"?"Prayer":t.name;}
function renderBotNav(){
  var bn=document.getElementById("botnav");if(!bn)return;bn.innerHTML="";
  PRIMARY.forEach(function(id){
    var t=null;for(var i=0;i<TABS.length;i++){if(TABS[i].id===id){t=TABS[i];break;}}
    if(!t)return;
    var it=el("div","bn-item"+(t.id===active?" on":""));
    it.innerHTML='<span class="bn-ic">'+t.icon+'</span><span class="bn-lb">'+shortName(t)+'</span>';
    it.onclick=function(){selectTab(t.id);};
    bn.appendChild(it);
  });
  // "More" is highlighted when the current tab lives in the overflow group.
  var moreOn=(PRIMARY.indexOf(active)<0);
  var more=el("div","bn-item"+(moreOn?" on":""));
  more.innerHTML='<span class="bn-ic">\u22EF</span><span class="bn-lb">More</span>';
  more.onclick=openMore;
  bn.appendChild(more);
}
function openMore(){
  var list=document.getElementById("ms-list");if(!list)return;list.innerHTML="";
  // Fill the sheet with every tab that isn't one of the 4 primary bottom-bar items.
  TABS.forEach(function(t){
    if(PRIMARY.indexOf(t.id)>=0)return; // primary tabs already sit on the bar
    var it=el("div","ms-item"+(t.id===active?" on":""));
    it.innerHTML='<span class="ms-ic">'+t.icon+'</span><span>'+t.name+'</span><span class="ms-pg">'+tabProgress(t.id)+'</span>';
    it.onclick=function(){selectTab(t.id);};
    list.appendChild(it);
  });
  var m=document.getElementById("moresheet");
  if(m){m.style.display="block";void m.offsetWidth;m.classList.add("open");} // reflow first so it slides up
}
function closeMore(){
  var m=document.getElementById("moresheet");if(!m)return;
  m.classList.remove("open");
  setTimeout(function(){if(!m.classList.contains("open"))m.style.display="none";},240); // hide after the slide-down
}
function renderMonths(){
  var host=document.getElementById("months");host.innerHTML="";
  MONTHS.forEach(function(m){var k=key(m);
    var b=el("button","mpill"+(k===cur?" on":""),MN[m].slice(0,3));
    b.onclick=async function(){cur=k;await loadMonth(k);renderMonths();renderRail();renderMain();};
    host.appendChild(b);
  });
}
function setSaved(){var t=document.getElementById("savetxt"),d=document.getElementById("savedot");if(t)t.textContent=canLS?"Saved automatically":"Saved \u00B7 this session";if(d)d.style.background="var(--ok)";}

/* ---------- Auth UI + passwordless magic-link sign-in ---------- */
function showAuth(show){var w=document.getElementById("authwrap");if(w)w.style.display=show?"flex":"none";}
function setAuthMsg(txt,isErr){var m=document.getElementById("authmsg");if(!m)return;m.textContent=txt||"";m.style.color=isErr?"var(--late)":"var(--muted)";}
// Header chip: shows the email + Sign out when signed in, or a Sync button when not.
function updateAccountUI(){
  var a=document.getElementById("account");if(!a)return;a.innerHTML="";
  if(user){
    a.appendChild(el("span","acc-email",user.email||"signed in"));
    var out=el("button","acc-btn","Sign out");
    out.onclick=function(){if(supa)supa.auth.signOut();};
    a.appendChild(out);
  }else{
    var inb=el("button","acc-btn","Sync");
    inb.onclick=function(){showAuth(true);};
    a.appendChild(inb);
  }
}
// Always send users back to the live GitHub Pages URL after they click the link.
var OTP_REDIRECT="https://tonnie-12.github.io/Cadence---Habit-tracker/";

// Email a passwordless magic link. Clicking it returns to the site and signs the user in.
async function sendMagicLink(){
  if(!supa){setAuthMsg("Sync is unavailable right now.",true);return;}
  var email=(document.getElementById("authemail").value||"").trim();
  if(!email||email.indexOf("@")<0){setAuthMsg("Enter a valid email address.",true);return;}
  setAuthMsg("Sending your sign-in link\u2026");
  try{
    var res=await supa.auth.signInWithOtp({email:email,options:{shouldCreateUser:true,emailRedirectTo:OTP_REDIRECT}});
    if(res.error)throw res.error;
    setAuthMsg("Check your email for the sign-in link, then click it to finish.");
  }catch(e){
    var msg=(e&&e.message)?e.message:String(e);
    if(/rate limit/i.test(msg)){
      setAuthMsg("Too many emails right now. Check your inbox/spam for an earlier link, or wait a little and try again.",true);
    }else if(/failed to fetch|networkerror|load failed/i.test(msg)){
      setAuthMsg("Couldn't reach the sync server. If you're in an editor preview, open the live site instead. Otherwise check your connection.",true);
    }else{
      setAuthMsg("Error: "+msg,true);
    }
  }
}
// One-time upload of local months that don't exist remotely yet. Never overwrites remote data.
async function migrateLocal(){
  if(!user||!supa)return;
  try{
    var res=await supa.from("tracker_months").select("month_key").eq("user_id",user.id);
    var have={};if(res.data)res.data.forEach(function(r){have[r.month_key]=true;});
    var uploads=[];
    for(var i=0;i<localStorage.length;i++){
      var lk=localStorage.key(i);
      if(lk&&lk.indexOf("cad:")===0&&lk!=="cad:theme"){
        var mk=lk.slice(4);
        if(!have[mk]){try{uploads.push({user_id:user.id,month_key:mk,data:JSON.parse(localStorage.getItem(lk)),updated_at:new Date().toISOString()});}catch(e){}}
      }
    }
    // ignoreDuplicates guarantees we never clobber a remote month that already exists.
    if(uploads.length)await supa.from("tracker_months").upsert(uploads,{onConflict:"user_id,month_key",ignoreDuplicates:true});
  }catch(e){/* migration is best-effort */}
}
// Runs once a session is confirmed (initial load or magic-link return).
async function onSignedIn(){
  showAuth(false);updateAccountUI();
  loaded={};                                   // drop cached months so we re-read from remote
  if(migratedFor!==user.id){migratedFor=user.id;await migrateLocal();}
  await loadMonth(cur);renderMonths();renderRail();renderMain();
  setStat("Saved","var(--ok)");
}
function wireAuthUI(){
  var send=document.getElementById("authsend");if(send)send.onclick=sendMagicLink;
  var email=document.getElementById("authemail");if(email)email.addEventListener("keydown",function(e){if(e.key==="Enter")sendMagicLink();});
  var skip=document.getElementById("authskip");if(skip)skip.onclick=function(){showAuth(false);};
}
// Establish the session and react to future auth changes (magic-link return, sign out).
function initAuth(){
  updateAccountUI();
  if(!supa){showAuth(false);return;}           // library missing -> stay offline/local
  // onAuthStateChange fires INITIAL_SESSION on load, SIGNED_IN after the email link, SIGNED_OUT on sign out.
  supa.auth.onAuthStateChange(function(evt,sess){
    user=sess?sess.user:null;
    if(user){onSignedIn();}
    else{updateAccountUI();showAuth(true);}
  });
}

function loadTheme(){try{return localStorage.getItem("cad:theme");}catch(e){return null;}}
function saveTheme(t){try{localStorage.setItem("cad:theme",t);}catch(e){}}
function applyTheme(t){if(t==="light")document.documentElement.setAttribute("data-theme","light");else document.documentElement.removeAttribute("data-theme");var b=document.getElementById("themebtn");if(b)b.setAttribute("aria-checked",t==="light"?"true":"false");}
var theme=loadTheme()||"dark";
(async function(){
  applyTheme(theme);
  var tb=document.getElementById("themebtn");
  if(tb)tb.onclick=function(){theme=(theme==="light")?"dark":"light";applyTheme(theme);saveTheme(theme);};
  wireAuthUI();
  var mb=document.getElementById("ms-backdrop");if(mb)mb.onclick=closeMore;
  var mx=document.getElementById("ms-x");if(mx)mx.onclick=closeMore;
  await loadMonth(cur);renderMonths();renderRail();renderMain();setSaved();
  initAuth(); // set up Supabase session + auth listener (loads remote data if already signed in)
})();
})();
</script>
